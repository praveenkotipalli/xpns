<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <th:block th:fragment="headerStyles">
        <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
        <style>
            :root {
                --ink: #0d0d0d;
                --paper: #f5f3ee;
                --surface: #ffffff;
                --accent: #c8f04a;
                --muted: #8a897f;
                --border: #e0ddd5;
                --font-head: 'Syne', sans-serif;
                --font-body: 'DM Sans', sans-serif;
            }
        </style>
    </th:block>
</head>
<body>

<header th:fragment="header" style="
    background: #0d0d0d;
    color: #fff;
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 60px;
    position: sticky;
    top: 0;
    z-index: 100;
    font-family: 'DM Sans', sans-serif;
">
    <a th:href="@{/}" style="text-decoration:none;">
        <span style="font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; color: #fff; letter-spacing: -0.3px;">
            xpns<span style="color: #c8f04a;">.</span>
        </span>
    </a>

    <nav style="display: flex; align-items: center; gap: 6px;">
        <a th:href="@{/}" style="
            color: rgba(255,255,255,0.55);
            text-decoration: none;
            font-size: 13px;
            font-weight: 400;
            padding: 7px 14px;
            border-radius: 50px;
            transition: background 0.2s, color 0.2s;
        "
        onmouseover="this.style.background='rgba(255,255,255,0.08)';this.style.color='#fff'"
        onmouseout="this.style.background='';this.style.color='rgba(255,255,255,0.55)'">
            Dashboard
        </a>

        <a th:href="@{/new}" style="
            color: rgba(255,255,255,0.55);
            text-decoration: none;
            font-size: 13px;
            font-weight: 400;
            padding: 7px 14px;
            border-radius: 50px;
            transition: background 0.2s, color 0.2s;
        "
        onmouseover="this.style.background='rgba(255,255,255,0.08)';this.style.color='#fff'"
        onmouseout="this.style.background='';this.style.color='rgba(255,255,255,0.55)'">
            Add Expense
        </a>

        <a th:href="@{/expenses}" style="
            background: #c8f04a;
            color: #0d0d0d;
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            padding: 7px 16px;
            border-radius: 50px;
            font-family: 'Syne', sans-serif;
            margin-left: 4px;
        ">
            Monthly →
        </a>
    </nav>
</header>

<th:block th:fragment="aiWidget">
<style>
    #askAiButton {
        position: fixed;
        right: 20px;
        bottom: 20px;
        z-index: 1200;
        border: none;
        border-radius: 999px;
        padding: 12px 18px;
        background: #0d0d0d;
        color: #c8f04a;
        font-family: 'Syne', sans-serif;
        font-size: 13px;
        font-weight: 700;
        box-shadow: 0 8px 22px rgba(0, 0, 0, 0.2);
        cursor: pointer;
    }

    #askAiButton:hover {
        transform: translateY(-1px);
    }

    #aiPanel {
        position: fixed;
        right: 20px;
        bottom: 72px;
        width: min(360px, calc(100vw - 28px));
        background: #ffffff;
        border: 1px solid #e0ddd5;
        border-radius: 14px;
        box-shadow: 0 20px 38px rgba(0, 0, 0, 0.2);
        z-index: 1201;
        display: none;
    }

    #aiPanel.open {
        display: block;
    }

    .ai-panel-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 12px 14px;
        border-bottom: 1px solid #f0ede6;
        font-family: 'Syne', sans-serif;
        font-weight: 600;
    }

    .ai-panel-close {
        border: none;
        background: transparent;
        color: #8a897f;
        font-size: 18px;
        line-height: 1;
        cursor: pointer;
    }

    .ai-panel-body {
        padding: 12px 14px 14px;
        font-family: 'DM Sans', sans-serif;
    }

    #askAiInput {
        width: 100%;
        min-height: 76px;
        resize: vertical;
        border: 1px solid #e0ddd5;
        border-radius: 10px;
        padding: 10px 11px;
        font-family: inherit;
        font-size: 14px;
    }

    .ai-panel-actions {
        margin-top: 10px;
        display: flex;
        justify-content: flex-end;
    }

    #askAiSubmit {
        border: none;
        border-radius: 10px;
        background: #0d0d0d;
        color: #c8f04a;
        padding: 8px 13px;
        font-family: 'Syne', sans-serif;
        font-weight: 600;
        cursor: pointer;
    }

    #askAiSubmit:disabled {
        opacity: 0.6;
        cursor: wait;
    }

    #askAiOutput {
        margin-top: 11px;
        font-size: 13px;
        color: #2d2d2d;
        white-space: pre-wrap;
        line-height: 1.45;
        max-height: 250px;
        overflow: auto;
        padding-right: 2px;
    }
</style>

<button id="askAiButton" type="button">Ask AI</button>

<div id="aiPanel" aria-hidden="true">
    <div class="ai-panel-header">
        <span>AI expense assistant</span>
        <button id="closeAiPanel" class="ai-panel-close" type="button">&times;</button>
    </div>
    <div class="ai-panel-body">
        <textarea id="askAiInput" placeholder="Ask: who spent more this month, and how can we reduce expenses?"></textarea>
        <div class="ai-panel-actions">
            <button id="askAiSubmit" type="button">Ask</button>
        </div>
        <div id="askAiOutput">Ask anything about this month's spending.</div>
    </div>
</div>

<script src="/js/ai-assistant.js"></script>
</th:block>

</body>
</html>
