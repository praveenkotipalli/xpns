# Render Blueprint — https://render.com/docs/blueprint-spec
# After push: connect repo in Render → New Blueprint Instance, or create Web Service manually with Docker.

services:
  - type: web
    name: expensys
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    region: oregon
    healthCheckPath: /
    envVars:
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      # Real AI on Render: https://aistudio.google.com/apikey — paste key in dashboard (never commit)
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: "gemini-2.0-flash"
      # Ollama is not available on Render; Gemini runs when GEMINI_API_KEY is set
      - key: AI_OLLAMA_ENABLED
        value: "false"
      - key: JAVA_OPTS
        value: "-Xmx512m"
