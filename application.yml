server:
  # Render sets PORT; local dev can use SERVER_PORT or default 8080
  port: ${PORT:${SERVER_PORT:8080}}

spring:
  application:
    name: expensys

  datasource:
    # Neon / Postgres: set SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME, SPRING_DATASOURCE_PASSWORD
    # Example URL (no credentials in the string): jdbc:postgresql://ep-xxx-pooler.region.aws.neon.tech/neondb?sslmode=require&channelBinding=require
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://ep-empty-glitter-am4xw2up-pooler.c-5.us-east-1.aws.neon.tech/neondb?sslmode=require&channelBinding=require}
    username: ${SPRING_DATASOURCE_USERNAME:neondb_owner}
    password: ${SPRING_DATASOURCE_PASSWORD:npg_dEbGvgrm1K7S}
    
# SPRING_DATASOURCE_USERNAME=neondb_owner
# SPRING_DATASOURCE_PASSWORD=npg_dEbGvgrm1K7S
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate.transaction.jta.platform: org.hibernate.engine.transaction.jta.platform.internal.NoJtaPlatform
      hibernate.dialect: org.hibernate.dialect.PostgreSQLDialect

  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    cache: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  web:
    resources:
      add-mappings: true

logging:
  level:
    org.springframework.web: DEBUG
    org.flywaydb: DEBUG

ai:
  # Real LLM on Render/cloud: create a key at https://aistudio.google.com/apikey then set GEMINI_API_KEY in Render
  gemini:
    api-key: ${GEMINI_API_KEY:}
    model: ${GEMINI_MODEL:gemini-2.0-flash}
  ollama:
    # Local dev: Ollama. On Render, leave disabled or unset — Gemini is used when GEMINI_API_KEY is set
    enabled: ${AI_OLLAMA_ENABLED:true}
    base-url: ${AI_OLLAMA_BASE_URL:http://127.0.0.1:11434}
    model: ${AI_OLLAMA_MODEL:llama3.2:3b}
